version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: face-attendance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: face_attendance
      MYSQL_USER: main
      MYSQL_PASSWORD: "1234"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    build: ./ai
    container_name: face-attendance-ai
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3

  backend:
    build: ./attendance
    container_name: face-attendance-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/face_attendance
      SPRING_DATASOURCE_USERNAME: main
      SPRING_DATASOURCE_PASSWORD: "1234"
      AI_SERVICE_URL: http://ai:5000
    depends_on:
      mysql:
        condition: service_healthy
      ai:
        condition: service_healthy

  frontend:
    build: ./face-attendance-fe
    container_name: face-attendance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:

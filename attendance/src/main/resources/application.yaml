spring:
  application:
    name: attendance
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/face_attendance}
    username: ${SPRING_DATASOURCE_USERNAME:main}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000}
